<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DisparaMeLi — Meus Anúncios</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f4f9f5; --surface: #ffffff; --surface2: #eef5f0;
      --border: #d0e8d8; --green: #1db954; --green-dark: #158a3e;
      --green-light: #e0f5e8; --green-muted: #a0d4b0;
      --text: #0f2018; --text-muted: #5a7a65;
      --yellow: #f5a623; --red: #e74c3c; --blue: #3483fa;
      --radius: 14px; --shadow: 0 2px 20px rgba(29,185,84,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .topbar { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 0 24px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .btn-back { background: transparent; border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 12px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--green); color: var(--green-dark); }
    .topbar-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
    .topbar-nick { background: var(--green-light); color: var(--green-dark); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }

    .main { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--surface); border-radius: 10px; border: 1.5px solid var(--border); padding: 14px; text-align: center; box-shadow: var(--shadow); }
    .stat-card.warn { background: #fffbf0; border-color: #fde8b4; }
    .stat-card.danger { background: #fdf5f5; border-color: #f5c6c2; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--green-dark); }
    .stat-val.warn { color: var(--yellow); }
    .stat-val.danger { color: var(--red); }
    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }

    /* FILTROS */
    .filtros-card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 16px 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .filtros-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filtro-btn { padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
    .filtro-btn:hover { border-color: var(--green); color: var(--green-dark); }
    .filtro-btn.active { background: var(--green); color: white; border-color: var(--green); }
    .filtro-btn.active-warn { background: var(--yellow); color: white; border-color: var(--yellow); }
    .filtro-btn.active-danger { background: var(--red); color: white; border-color: var(--red); }
    .busca-input { flex: 1; min-width: 180px; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--surface2); outline: none; transition: border 0.2s; }
    .busca-input:focus { border-color: var(--green); }

    /* ANÚNCIOS */
    .anuncios-grid { display: grid; gap: 12px; }
    .anuncio-card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; box-shadow: var(--shadow); transition: box-shadow 0.2s; animation: fadeUp 0.3s ease; }
    .anuncio-card:hover { box-shadow: 0 4px 24px rgba(29,185,84,0.12); }
    .anuncio-card.tem-aviso { border-color: #fde8b4; }
    .anuncio-card.tem-critico { border-color: #f5c6c2; }
    .anuncio-card.pausado { opacity: 0.75; }

    .anuncio-top { padding: 14px 16px 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .anuncio-info { flex: 1; }
    .anuncio-mlb { font-size: 11px; color: var(--blue); font-weight: 600; background: #eef4ff; display: inline-block; padding: 3px 9px; border-radius: 6px; margin-bottom: 6px; }
    .anuncio-titulo { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
    .anuncio-pausado .anuncio-titulo { color: var(--text-muted); }
    .anuncio-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .anuncio-preco { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--green-dark); }
    .anuncio-pausado .anuncio-preco { color: var(--text-muted); }
    .anuncio-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .badge-ativo { background: var(--green-light); color: var(--green-dark); }
    .badge-pausado { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-problema { background: #fffbf0; color: #b7791f; border: 1px solid #fde8b4; }
    .badge-critico { background: #fdf0ef; color: var(--red); border: 1px solid #f5c6c2; }
    .badge-ok { background: var(--green-light); color: var(--green-dark); }

    .anuncio-metricas { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 16px 10px; }
    .metrica-chip { font-size: 11px; color: var(--text-muted); background: var(--bg); border-radius: 6px; padding: 4px 10px; border: 1px solid var(--border); }
    .metrica-chip.warn { background: #fffbf0; color: #b7791f; border-color: #fde8b4; }
    .metrica-chip.danger { background: #fdf5f5; color: var(--red); border-color: #f5c6c2; }

    .problemas-list { border-top: 1px solid var(--border); padding: 10px 16px; display: grid; gap: 6px; }
    .problemas-list.aviso { background: #fffbf0; border-top-color: #fde8b4; }
    .problemas-list.critico { background: #fdf5f5; border-top-color: #f5c6c2; }
    .problema-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; line-height: 1.5; }
    .problema-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .problema-item.aviso { color: #7a4f00; }
    .problema-item.aviso .problema-dot { background: var(--yellow); }
    .problema-item.critico { color: #7a1a1a; }
    .problema-item.critico .problema-dot { background: var(--red); }

    .anuncio-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .btn-meli-link { font-size: 11px; font-weight: 700; color: var(--blue); text-decoration: none; background: #eef4ff; padding: 6px 12px; border-radius: 7px; transition: all 0.2s; }
    .btn-meli-link:hover { background: #ddeeff; }

    /* PAGINAÇÃO */
    .paginacao { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 24px; padding-bottom: 24px; }
    .pag-btn { padding: 9px 18px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .pag-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green-dark); }
    .pag-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .pag-btn.active { background: var(--green); color: white; border-color: var(--green); }
    .pag-info { font-size: 13px; color: var(--text-muted); }

    /* EMPTY / LOADING */
    .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .loading { text-align: center; padding: 48px 20px; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--green-muted); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .loading-txt { font-size: 14px; color: var(--text-muted); margin-top: 12px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .main { padding: 16px 14px; }
      .topbar { padding: 0 16px; }
      .anuncio-top { flex-direction: column; }
      .anuncio-badges { flex-direction: row; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="btn-back" onclick="window.location.href='index.html'">← Voltar</button>
    <div class="topbar-title">📦 Meus Anúncios</div>
  </div>
  <span class="topbar-nick" id="topNick">@seller</span>
</div>

<div class="main">

  <!-- STATS -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-val" id="statTotal">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statAtivos">—</div>
      <div class="stat-label">Ativos</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-val warn" id="statPausados">—</div>
      <div class="stat-label">Pausados</div>
    </div>
    <div class="stat-card danger">
      <div class="stat-val danger" id="statProblemas">—</div>
      <div class="stat-label">Com problemas</div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filtros-card">
    <div class="filtros-row">
      <button class="filtro-btn active" onclick="setFiltro('todos', this)">Todos</button>
      <button class="filtro-btn" onclick="setFiltro('problemas', this)">⚠️ Com problemas</button>
      <button class="filtro-btn" onclick="setFiltro('pausados', this)">⏸️ Pausados</button>
      <button class="filtro-btn" onclick="setFiltro('estoque', this)">📦 Estoque baixo</button>
      <input type="text" class="busca-input" id="buscaInput" placeholder="🔍 Buscar por título ou MLB..."
        oninput="renderAnuncios()"/>
    </div>
  </div>

  <!-- LISTA -->
  <div class="anuncios-grid" id="anunciosGrid">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-txt">Carregando seus anúncios...</div>
    </div>
  </div>

  <!-- PAGINAÇÃO -->
  <div class="paginacao" id="paginacao" style="display:none">
    <button class="pag-btn" id="btnAnterior" onclick="mudarPagina(-1)">← Anterior</button>
    <span class="pag-info" id="pagInfo">Página 1</span>
    <button class="pag-btn active" id="btnProxima" onclick="mudarPagina(1)">Próxima →</button>
  </div>

</div>

<script>
  const API = 'https://disparameli.onrender.com';
  const sellerId = localStorage.getItem('dispara_seller_id');
  if (!sellerId) window.location.href = 'index.html';
  document.getElementById('topNick').textContent = '@' + sellerId;

  let todosAnuncios = [];
  let filtroAtivo = 'todos';
  let paginaAtual = 1;
  const POR_PAGINA = 20;

  window.addEventListener('load', carregarAnuncios);

  async function carregarAnuncios() {
    try {
      const res = await fetch(`${API}/seller/${sellerId}/anuncios`);
      const data = await res.json();

      const ativos = (data.anuncios_com_problema || []);
      const totalAtivos = data.total_ativos || 0;
      const totalPausados = data.total_pausados || 0;
      const comProblema = ativos.length;

      document.getElementById('statTotal').textContent = totalAtivos + totalPausados;
      document.getElementById('statAtivos').textContent = totalAtivos;
      document.getElementById('statPausados').textContent = totalPausados;
      document.getElementById('statProblemas').textContent = comProblema;

      // Monta lista completa com status
      todosAnuncios = ativos.map(a => ({ ...a, status: 'ativo', temProblema: true }));

      // Pausados: mostra aviso geral sem IDs falsos
      if (totalPausados > 0) {
        todosAnuncios.push({
          id: '',
          titulo: `Você tem ${totalPausados} anúncio(s) pausado(s). Acesse o Mercado Livre para reativar.`,
          preco: 0,
          status: 'pausado',
          temProblema: false,
          problemas: []
        });
      }

      renderAnuncios();
    } catch(e) {
      document.getElementById('anunciosGrid').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><p>Erro ao carregar anúncios. Tente recarregar.</p></div>`;
    }
  }

  function setFiltro(filtro, btn) {
    filtroAtivo = filtro;
    paginaAtual = 1;
    document.querySelectorAll('.filtro-btn').forEach(b => {
      b.className = 'filtro-btn';
    });
    btn.classList.add('active');
    renderAnuncios();
  }

  function renderAnuncios() {
    const busca = document.getElementById('buscaInput').value.toLowerCase();

    let lista = todosAnuncios.filter(a => {
      const matchBusca = !busca || a.titulo.toLowerCase().includes(busca) || a.id.toLowerCase().includes(busca);
      if (!matchBusca) return false;
      if (filtroAtivo === 'problemas') return a.temProblema;
      if (filtroAtivo === 'pausados') return a.status === 'pausado';
      if (filtroAtivo === 'estoque') return a.problemas?.some(p => p.includes('Estoque baixo') || p.includes('⚠️ Estoque'));
      return true;
    });

    const total = lista.length;
    const totalPag = Math.ceil(total / POR_PAGINA);
    if (paginaAtual > totalPag) paginaAtual = 1;

    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = lista.slice(inicio, inicio + POR_PAGINA);

    const grid = document.getElementById('anunciosGrid');

    if (!pagina.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>Nenhum anúncio encontrado para este filtro.</p></div>`;
      document.getElementById('paginacao').style.display = 'none';
      return;
    }

    grid.innerHTML = pagina.map(a => renderCard(a)).join('');

    // Paginação
    const pag = document.getElementById('paginacao');
    if (totalPag > 1) {
      pag.style.display = 'flex';
      document.getElementById('pagInfo').textContent = `Página ${paginaAtual} de ${totalPag} (${total} anúncios)`;
      document.getElementById('btnAnterior').disabled = paginaAtual === 1;
      document.getElementById('btnProxima').disabled = paginaAtual === totalPag;
    } else {
      pag.style.display = 'none';
    }
  }

  function renderCard(a) {
    const isPausado = a.status === 'pausado';
    const problemas = a.problemas || [];
    const temCritico = problemas.some(p => p.includes('⚠️') || p.includes('Estoque'));
    const temAviso = problemas.length > 0 && !temCritico;

    let borderClass = '';
    if (temCritico) borderClass = 'tem-critico';
    else if (temAviso) borderClass = 'tem-aviso';
    else if (isPausado) borderClass = 'pausado';

    let badgeProblema = '';
    if (problemas.length > 0) {
      if (temCritico) badgeProblema = `<span class="badge badge-critico">🔴 ${problemas.length} problema(s)</span>`;
      else badgeProblema = `<span class="badge badge-problema">⚠️ ${problemas.length} aviso(s)</span>`;
    } else if (!isPausado) {
      badgeProblema = `<span class="badge badge-ok">✅ Ok</span>`;
    }

    const statusBadge = isPausado
      ? `<span class="badge badge-pausado">⏸️ Pausado</span>`
      : `<span class="badge badge-ativo">🟢 Ativo</span>`;

    const problemasHtml = problemas.length ? `
      <div class="problemas-list ${temCritico ? 'critico' : 'aviso'}">
        ${problemas.map(p => `
          <div class="problema-item ${p.includes('⚠️') ? 'critico' : 'aviso'}">
            <div class="problema-dot"></div>
            <span>${p.replace('⚠️ ', '')}</span>
          </div>`).join('')}
      </div>` : '';

    const metricasHtml = !isPausado ? `
      <div class="anuncio-metricas">
        ${a.fotos !== undefined ? `<span class="metrica-chip ${a.fotos < 8 ? 'warn' : ''}">📷 ${a.fotos} foto(s)</span>` : ''}
        ${a.estoque !== undefined ? `<span class="metrica-chip ${a.estoque <= 2 ? 'danger' : a.estoque <= 5 ? 'warn' : ''}">📦 Estoque: ${a.estoque}</span>` : ''}
        ${a.preco ? `<span class="metrica-chip">💲 R$ ${Number(a.preco).toFixed(2)}</span>` : ''}
      </div>` : '';

    const mlbId = isPausado ? '' : a.id;
    const melihref = isPausado ? '' : `https://www.mercadolivre.com.br/p/${a.id}`;

    return `
      <div class="anuncio-card ${borderClass}">
        <div class="anuncio-top">
          <div class="anuncio-info ${isPausado ? 'anuncio-pausado' : ''}">
            ${mlbId ? `<div class="anuncio-mlb">${mlbId}</div>` : ''}
            <div class="anuncio-titulo">${a.titulo}</div>
            <div class="anuncio-meta">
              ${a.preco ? `<div class="anuncio-preco">R$ ${Number(a.preco).toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>` : ''}
            </div>
          </div>
          <div class="anuncio-badges">
            ${badgeProblema}
            ${statusBadge}
          </div>
        </div>
        ${metricasHtml}
        ${problemasHtml}
        ${!isPausado ? `
        <div class="anuncio-footer">
          <a href="${a.permalink || 'https://www.mercadolivre.com.br/p/' + mlbId}" target="_blank" class="btn-meli-link">🔗 Ver no MELI</a>
        </div>` : ''}
      </div>`;
  }

  function mudarPagina(dir) {
    paginaAtual += dir;
    renderAnuncios();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
